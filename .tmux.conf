unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"
set -gq utf8 on
set -sg escape-time 0
set -g repeat-time 1000
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 50000

# --- Pane navigation: Alt+h/j/k/l (no prefix needed, no conflicts) ---
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# --- Splits: prefix + \ or | (vertical), prefix + - (horizontal) ---
bind \\ split-window -h -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# --- Resize panes: prefix + H/J/K/L (repeatable) ---
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# --- Kill pane without confirm ---
bind x kill-pane

# --- Quick reload ---
bind r source-file ~/.tmux.conf \; display-message "Config reloaded"

# --- Mouse support ---
set -g mouse on
set -g set-clipboard external

# DESIGN TWEAKS

#don't do anything when a 'bell' rings
set -g visual-activity off
set -g visual-bell off
set -g visual-silence off
setw -g monitor-activity off
set -g bell-action none

# --- Catppuccin Mocha (matches neovim) ---
set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_status_background 'default'

# Plain text flags — no nerd font icons
set -g @catppuccin_window_text " #W "
set -g @catppuccin_window_current_text " #W "
set -g @catppuccin_window_flags_icon_last " -"
set -g @catppuccin_window_flags_icon_current " *"
set -g @catppuccin_window_flags_icon_zoom " Z"
set -g @catppuccin_window_flags_icon_mark " M"
set -g @catppuccin_window_flags_icon_silent " ~"
set -g @catppuccin_window_flags_icon_activity " #"
set -g @catppuccin_window_flags_icon_bell " !"

# Strip nerd font icons from status modules
set -g @catppuccin_session_icon ""
set -g @catppuccin_date_time_icon ""
set -g @catppuccin_directory_icon ""
set -g @catppuccin_host_icon ""
set -g @catppuccin_window_status_style "rounded"
run '~/.tmux/plugins/catppuccin-tmux/catppuccin.tmux'

set -g status-position bottom
set -g status-justify left
set -g status-left "#{E:@catppuccin_status_session}"
run-shell '~/.tmux/scripts/set-status-right.sh'
set -g status-right "#{@weather_display} #{E:@catppuccin_status_date_time}"

# Refresh weather every 10 minutes
# set-hook -g pane-focus-in 'run-shell -b "~/.tmux/scripts/set-status-right.sh > /dev/null 2>&1"'


#-------- Copy Mode (Vim Style) {{{
#------------------------------------------------------
# This section of hotkeys mainly work in copy mode and no where else

# vim keys in copy and choose mode
set-window-option -g mode-keys vi

# copying selection vim style
# http://jasonwryan.com/blog/2011/06/07/copy-and-paste-in-tmux/
# https://github.com/myfreeweb/dotfiles/blob/master/tmux.conf
bind-key Escape copy-mode			# enter copy mode; default [
bind-key p paste-buffer				# paste; (default hotkey: ] )
bind-key P choose-buffer 			# tmux clipboard history
bind-key + delete-buffer \; display-message "Deleted current Tmux Clipboard History"

# Copy mode: vim-style selection, copy goes to system clipboard via OSC 52
# (OSC 52 works over SSH — Windows Terminal supports it natively)
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi V send-keys -X select-line
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T choice-mode-vi h send-keys -X tree-collapse
bind-key -T choice-mode-vi l send-keys -X tree-expand
bind-key -T choice-mode-vi H send-keys -X tree-collapse-all
bind-key -T choice-mode-vi L send-keys -X tree-expand-all
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-selection-and-cancel

# --- TPM (keep at very bottom) ---
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
run '~/.tmux/plugins/tpm/tpm'

